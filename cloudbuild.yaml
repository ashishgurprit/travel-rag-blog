# cloudbuild.yaml
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/backend:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/backend:latest'
      - '.'
    timeout: '1800s'  # 30 min — model download takes time

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags',
           '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/backend']

  # Deploy to Cloud Run — secrets injected from Secret Manager via --set-secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'travel-rag-backend'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/backend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--concurrency=80'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--vpc-connector=travel-rag-connector'
      - '--vpc-egress=private-ranges-only'
      - '--set-secrets=PINECONE_API_KEY=PINECONE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,REDIS_URL=REDIS_URL:latest,PINECONE_INDEX_NAME=PINECONE_INDEX_NAME:latest,CORS_ORIGIN=CORS_ORIGIN:latest,BOOKING_AFFILIATE_ID=BOOKING_AFFILIATE_ID:latest,KLOOK_AFFILIATE_ID=KLOOK_AFFILIATE_ID:latest,WISE_AFFILIATE_ID=WISE_AFFILIATE_ID:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest'

substitutions:
  _REGION: us-central1
  _REPO: travel-rag

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '2400s'
